<VirtualHost *:80>
    ServerName gem.tcon.app
    DocumentRoot /var/www/gem.tcon.app/html

    # ── API reverse proxy to backend VM ───────────────
    # Must come BEFORE the SPA rewrite rules so /api/* is proxied, not rewritten
    ProxyPreserveHost On
    ProxyPass /api/ http://10.0.6.246:3001/api/
    ProxyPassReverse /api/ http://10.0.6.246:3001/api/

    # Forward client info to backend
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # ── Static files + SPA fallback ───────────────────
    <Directory /var/www/gem.tcon.app/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        # Don't rewrite existing files/dirs or /api requests
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteRule ^ index.html [L]
    </Directory>

    # ── Logs ──────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/gem.tcon.app-error.log
    CustomLog ${APACHE_LOG_DIR}/gem.tcon.app-access.log combined
</VirtualHost>
